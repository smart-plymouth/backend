name: Build and Push Container Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: registry.robertputt.technology
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: registry.robertputt.technology/smartplymouth/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: List image layers and sizes
        run: |
          docker history --no-trunc --format "table {{.CreatedBy}}\t{{.Size}}" \
            registry.robertputt.technology/smartplymouth/backend:latest

      - name: Push image
        run: |
          docker push registry.robertputt.technology/smartplymouth/backend:latest
