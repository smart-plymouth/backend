---
apiVersion: v1
kind: Namespace
metadata:
  name: smartplymouth

---
# PostgreSQL PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: smartplymouth
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 60Gi

---
# Redis PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: smartplymouth
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: smartplymouth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          args: ["-c", "max_connections=200"]
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: smartplymouth
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: smartplymouth
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: smartplymouth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-storage
              mountPath: /data
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: smartplymouth
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: smartplymouth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: api
          image: registry.robertputt.technology/smartplymouth/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/smartplymouth
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: SECRET_KEY
              value: change-me-in-production
            - name: NSCALE_BASE_URL
              value: https://inference.api.nscale.com/v1
            - name: NSCALE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nscale-credentials
                  key: token
            - name: LLM_MODEL
              value: Qwen/Qwen3-32B
          command: ["/bin/api"]

---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: smartplymouth
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 5000
      targetPort: 5000

---
# Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: smartplymouth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: worker
          image: registry.robertputt.technology/smartplymouth/backend:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/smartplymouth
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: NSCALE_BASE_URL
              value: https://inference.api.nscale.com/v1
            - name: NSCALE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nscale-credentials
                  key: token
            - name: LLM_MODEL
              value: Qwen/Qwen3-32B
            - name: EMBEDDING_MODEL
              value: Qwen/Qwen3-Embedding-8B
            - name: WORKER_CONCURRENCY
              value: "4"
          command: ["/bin/worker"]

---
# Scheduler Deployment (replaces Celery Beat)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: smartplymouth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: scheduler
          image: registry.robertputt.technology/smartplymouth/backend:latest
          imagePullPolicy: Always
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
          command: ["/bin/scheduler"]

---
# Database Migration Job
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: smartplymouth
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      imagePullSecrets:
        - name: regcred
      restartPolicy: Never
      containers:
        - name: migrate
          image: registry.robertputt.technology/smartplymouth/backend:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/smartplymouth
          command: ["/bin/migrate", "up"]
