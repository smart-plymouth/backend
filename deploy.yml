---
apiVersion: v1
kind: Namespace
metadata:
  name: smartplymouth

---
# PostgreSQL PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: smartplymouth
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 60Gi

---
# Redis PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: smartplymouth
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: smartplymouth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: smartplymouth
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: smartplymouth
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: smartplymouth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-storage
              mountPath: /data
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: smartplymouth
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
# Flask API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: smartplymouth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: api
          image: registry.robertputt.technology/smartplymouth/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/smartplymouth
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/0
            - name: SECRET_KEY
              value: change-me-in-production
          command: ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "4", "wsgi:app"]

---
# Flask API Service
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: smartplymouth
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 5000
      targetPort: 5000

---
# Celery Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: smartplymouth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: celery-worker
          image: registry.robertputt.technology/smartplymouth/backend:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/smartplymouth
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/0
          command: ["celery", "-A", "app.celery_app.celery", "worker", "--loglevel=info", "--concurrency=2"]

---
# Celery Planning Analysis Worker Deployment (concurrency=1)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker-planning-analysis
  namespace: smartplymouth
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: celery-worker-planning-analysis
  template:
    metadata:
      labels:
        app: celery-worker-planning-analysis
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: celery-worker-planning-analysis
          image: registry.robertputt.technology/smartplymouth/backend:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/smartplymouth
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/0
            - name: OLLAMA_BASE_URL
              value: http://172.20.40.8:11434
            - name: OLLAMA_MODEL
              value: gemma4:e4b
          command: ["celery", "-A", "app.celery_app.celery", "worker", "--queues=planning_analysis", "--concurrency=1", "--loglevel=info"]

---
# Celery Flower Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-flower
  namespace: smartplymouth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-flower
  template:
    metadata:
      labels:
        app: celery-flower
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: celery-flower
          image: registry.robertputt.technology/smartplymouth/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5555
          env:
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/0
          command: ["celery", "-A", "app.celery_app.celery", "flower", "--port=5555"]

---
# Celery Flower Service
apiVersion: v1
kind: Service
metadata:
  name: celery-flower
  namespace: smartplymouth
spec:
  type: LoadBalancer
  selector:
    app: celery-flower
  ports:
    - port: 5555
      targetPort: 5555

---
# Celery Beat Deployment (scheduler)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: smartplymouth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: celery-beat
          image: registry.robertputt.technology/smartplymouth/backend:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/smartplymouth
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/0
          command: ["celery", "-A", "app.celery_app.celery", "beat", "--loglevel=info"]

---
# Database Migration Job
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: smartplymouth
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      imagePullSecrets:
        - name: regcred
      restartPolicy: Never
      containers:
        - name: migrate
          image: registry.robertputt.technology/smartplymouth/backend:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/smartplymouth
          command: ["alembic", "upgrade", "head"]
